name: kumoriya_source_runtime
description: Runtime helpers shared by Kumoriya source plugins. Provides mirror rotation and transport-failure classification so plugins can transparently fall back across a list of equivalent base URLs without exposing rotation to upstream callers.
version: 0.1.0
publish_to: none

resolution: workspace

environment:
  sdk: ^3.11.1

dependencies:
  http: ^1.5.0

dev_dependencies:
  lints: ^6.0.0
  test: ^1.25.6
