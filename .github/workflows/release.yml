name: Release

on:
  workflow_dispatch:
    inputs:
      version:
        description: "Release version (X.Y.Z) — must match pubspec.yaml"
        required: true
        type: string
      channel:
        description: "Release channel"
        required: false
        default: "alpha"
        type: string
      summary_en:
        description: "Release summary (English)"
        required: false
        default: "Bug fixes and improvements."
        type: string
      summary_es:
        description: "Release summary (Spanish)"
        required: false
        default: "Correcciones y mejoras."
        type: string

jobs:
  build-android:
    runs-on: ubuntu-latest
    outputs:
      version: ${{ steps.meta.outputs.version }}
      tag: ${{ steps.meta.outputs.tag }}
      filename: ${{ steps.meta.outputs.filename }}
      r2_key: ${{ steps.meta.outputs.r2_key }}
      public_url: ${{ steps.meta.outputs.public_url }}
      sha256: ${{ steps.meta.outputs.sha256 }}
      size_bytes: ${{ steps.meta.outputs.size_bytes }}
    steps:
      - uses: actions/checkout@v4

      - uses: subosito/flutter-action@v2
        with:
          channel: stable

      - name: Set up Java 17
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: "17"

      - name: Decode keystore
        run: |
          echo "${{ secrets.ANDROID_KEYSTORE_JKS }}" | base64 -d > apps/kumoriya_app/android/kumoriya-release.jks

      - name: Write key.properties
        run: |
          cat > apps/kumoriya_app/android/key.properties << 'KEYPROPS'
          storePassword=${{ secrets.ANDROID_KEYSTORE_PASSWORD }}
          keyPassword=${{ secrets.ANDROID_KEYSTORE_PASSWORD }}
          keyAlias=${{ secrets.ANDROID_KEY_ALIAS }}
          storeFile=../kumoriya-release.jks
          KEYPROPS

      - name: Write google-services.json
        run: |
          echo '${{ secrets.ANDROID_GOOGLE_SERVICES_JSON }}' > apps/kumoriya_app/android/app/google-services.json

      - name: Flutter pub get
        run: flutter pub get
        working-directory: apps/kumoriya_app

      - name: Build Android APK (arm64-v8a)
        run: flutter build apk --release --split-per-abi --target-platform android-arm64
        working-directory: apps/kumoriya_app

      - name: Compute checksum and metadata
        id: meta
        run: |
          APK="apps/kumoriya_app/build/app/outputs/flutter-apk/app-arm64-v8a-release.apk"
          VERSION=$(grep -E '^version:' apps/kumoriya_app/pubspec.yaml | sed -E 's/version: ([0-9]+\.[0-9]+\.[0-9]+)\+.*/\1/')
          TAG="v$VERSION"
          FILENAME="kumoriya-$VERSION-arm64-v8a.apk"
          R2_KEY="artifacts/android/$TAG/$FILENAME"
          PUBLIC_URL="${{ secrets.R2_PUBLIC_BASE_URL }}/$R2_KEY"
          SHA=$(sha256sum "$APK" | awk '{print $1}')
          SIZE=$(stat -c%s "$APK")
          echo "version=$VERSION" >> "$GITHUB_OUTPUT"
          echo "tag=$TAG" >> "$GITHUB_OUTPUT"
          echo "filename=$FILENAME" >> "$GITHUB_OUTPUT"
          echo "r2_key=$R2_KEY" >> "$GITHUB_OUTPUT"
          echo "public_url=$PUBLIC_URL" >> "$GITHUB_OUTPUT"
          echo "sha256=$SHA" >> "$GITHUB_OUTPUT"
          echo "size_bytes=$SIZE" >> "$GITHUB_OUTPUT"

      - name: Upload APK to R2
        env:
          AWS_ACCESS_KEY_ID: ${{ secrets.AWS_ACCESS_KEY_ID }}
          AWS_SECRET_ACCESS_KEY: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
        run: |
          aws s3 cp "apps/kumoriya_app/build/app/outputs/flutter-apk/app-arm64-v8a-release.apk" \
            "s3://${{ secrets.R2_BUCKET_NAME }}/${{ steps.meta.outputs.r2_key }}" \
            --endpoint-url "${{ secrets.R2_ENDPOINT_URL }}" \
            --region auto \
            --content-type "application/vnd.android.package-archive" \
            --content-disposition "attachment; filename=\"${{ steps.meta.outputs.filename }}\""

      - name: Upload to GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ steps.meta.outputs.tag }}
          name: "Release ${{ steps.meta.outputs.tag }}"
          draft: false
          prerelease: true
          files: |
            apps/kumoriya_app/build/app/outputs/flutter-apk/app-arm64-v8a-release.apk

  build-windows:
    runs-on: windows-latest
    outputs:
      version: ${{ steps.meta.outputs.version }}
      tag: ${{ steps.meta.outputs.tag }}
      filename: ${{ steps.meta.outputs.filename }}
      r2_key: ${{ steps.meta.outputs.r2_key }}
      public_url: ${{ steps.meta.outputs.public_url }}
    steps:
      - uses: actions/checkout@v4

      - uses: subosito/flutter-action@v2
        with:
          channel: stable

      - name: Flutter pub get
        run: flutter pub get
        working-directory: apps/kumoriya_app

      - name: Build Windows runner
        run: flutter build windows --release
        working-directory: apps/kumoriya_app

      - name: Install Inno Setup
        run: choco install innosetup --no-progress -y

      - name: Patch ISS version
        shell: pwsh
        run: |
          $version = (Select-String -Path apps\kumoriya_app\pubspec.yaml -Pattern '^version:\s*([0-9]+\.[0-9]+\.[0-9]+)\+').Matches.Groups[1].Value
          $issPath = "apps\kumoriya_app\windows\kumoriya_installer.iss"
          $content = Get-Content -Path $issPath -Raw
          $content = $content -replace '(?m)^AppVersion=.*$', "AppVersion=$version"
          $content = $content -replace '(?m)^OutputBaseFilename=.*$', "OutputBaseFilename=Kumoriya-$version-windows-x64-setup"
          Set-Content -Path $issPath -Value $content -NoNewline
          Write-Host "ISS patched to version $version"

      - name: Build Inno Setup installer
        shell: pwsh
        run: |
          iscc "apps\kumoriya_app\windows\kumoriya_installer.iss" /Qp

      - name: Compute metadata
        id: meta
        shell: pwsh
        run: |
          $pubspec = Get-Content apps\kumoriya_app\pubspec.yaml -Raw
          $version = ($pubspec | Select-String -Pattern 'version:\s*([0-9]+\.[0-9]+\.[0-9]+)\+').Matches.Groups[1].Value
          $tag = "v$version"
          $filename = "Kumoriya-$version-windows-x64-setup.exe"
          $r2Key = "artifacts/windows/$tag/$filename"
          $publicUrl = "${{ secrets.R2_PUBLIC_BASE_URL }}/$r2Key"
          echo "version=$version" >> $env:GITHUB_OUTPUT
          echo "tag=$tag" >> $env:GITHUB_OUTPUT
          echo "filename=$filename" >> $env:GITHUB_OUTPUT
          echo "r2_key=$r2Key" >> $env:GITHUB_OUTPUT
          echo "public_url=$publicUrl" >> $env:GITHUB_OUTPUT

      - name: Configure AWS and upload to R2
        shell: pwsh
        run: |
          $env:AWS_ACCESS_KEY_ID = "${{ secrets.AWS_ACCESS_KEY_ID }}"
          $env:AWS_SECRET_ACCESS_KEY = "${{ secrets.AWS_SECRET_ACCESS_KEY }}"
          aws s3 cp "apps\kumoriya_app\build\windows\installer\${{ steps.meta.outputs.filename }}" `
            "s3://${{ secrets.R2_BUCKET_NAME }}/${{ steps.meta.outputs.r2_key }}" `
            --endpoint-url "${{ secrets.R2_ENDPOINT_URL }}" `
            --region auto `
            --content-type "application/octet-stream" `
            --content-disposition "attachment; filename=`"${{ steps.meta.outputs.filename }}`""

      - name: Upload to GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ steps.meta.outputs.tag }}
          name: "Release ${{ steps.meta.outputs.tag }}"
          draft: false
          prerelease: true
          files: |
            apps/kumoriya_app/build/windows/installer/${{ steps.meta.outputs.filename }}

  publish:
    runs-on: ubuntu-latest
    needs: [build-android, build-windows]
    steps:
      - uses: actions/checkout@v4

      - name: Install jq
        run: sudo apt-get update -qq && sudo apt-get install -y -qq jq

      - name: Read version
        id: version
        run: |
          VERSION=$(grep -E '^version:' apps/kumoriya_app/pubspec.yaml | sed -E 's/version: ([0-9]+\.[0-9]+\.[0-9]+)\+.*/\1/')
          echo "version=$VERSION" >> "$GITHUB_OUTPUT"
          echo "tag=v$VERSION" >> "$GITHUB_OUTPUT"

      - name: Read release notes
        id: notes
        run: |
          TAG="v${{ steps.version.outputs.version }}"
          NOTES_EN="$(cat docs/releases/en/$TAG.md)"
          NOTES_ES="$(cat docs/releases/es/$TAG.md)"
          # Write to env so jq can read them (avoids shell quoting issues with multiline)
          echo "NOTES_EN<<ENEOF" >> "$GITHUB_ENV"
          echo "$NOTES_EN" >> "$GITHUB_ENV"
          echo "ENEOF" >> "$GITHUB_ENV"
          echo "NOTES_ES<<ESEOF" >> "$GITHUB_ENV"
          echo "$NOTES_ES" >> "$GITHUB_ENV"
          echo "ESEOF" >> "$GITHUB_ENV"

      - name: Publish to API
        env:
          VERSION: ${{ steps.version.outputs.version }}
          TAG: ${{ steps.version.outputs.tag }}
          CHANNEL: ${{ inputs.channel }}
          SUMMARY_EN: ${{ inputs.summary_en }}
          SUMMARY_ES: ${{ inputs.summary_es }}
          AND_FN: ${{ needs.build-android.outputs.filename }}
          AND_R2: ${{ needs.build-android.outputs.r2_key }}
          AND_URL: ${{ needs.build-android.outputs.public_url }}
          AND_SHA: ${{ needs.build-android.outputs.sha256 }}
          AND_SZ: ${{ needs.build-android.outputs.size_bytes }}
          WIN_FN: ${{ needs.build-windows.outputs.filename }}
          WIN_R2: ${{ needs.build-windows.outputs.r2_key }}
          WIN_URL: ${{ needs.build-windows.outputs.public_url }}
        run: |
          PAYLOAD=$(jq -n \
            --arg v "$VERSION" --arg tag "$TAG" \
            --arg date "$(date -u +%F)" --arg ch "$CHANNEL" \
            --arg notes "$SUMMARY_EN" \
            --arg sumEs "$SUMMARY_ES" --arg sumEn "$SUMMARY_EN" \
            --arg notesEs "$NOTES_ES" --arg notesEn "$NOTES_EN" \
            --arg andFn "$AND_FN" --arg andR2 "$AND_R2" --arg andUrl "$AND_URL" \
            --arg andSha "$AND_SHA" --argjson andSz "$AND_SZ" \
            --arg winFn "$WIN_FN" --arg winR2 "$WIN_R2" --arg winUrl "$WIN_URL" \
            '{
              version: $v, tag: $tag, date: $date, channel: $ch,
              manifest_release_notes: $notes,
              summary: {es: $sumEs, en: $sumEn},
              notes_markdown: {es: $notesEs, en: $notesEn},
              is_latest: true,
              downloads: {
                android: {
                  url: $andUrl,
                  file_name: $andFn,
                  r2_key: $andR2,
                  size_bytes: $andSz,
                  sha256: $andSha,
                  abis: {
                    arm64_v8a: {
                      url: $andUrl,
                      file_name: $andFn,
                      r2_key: $andR2,
                      size_bytes: $andSz,
                      sha256: $andSha
                    }
                  }
                },
                windows: {
                  url: $winUrl,
                  file_name: $winFn,
                  r2_key: $winR2
                }
              }
            }')
          echo "$PAYLOAD" | jq .
          curl -fsSL -X POST "${{ secrets.UPDATE_API_BASE_URL }}/internal/releases/publish" \
            -H "Authorization: Bearer ${{ secrets.RELEASE_PUBLISH_TOKEN }}" \
            -H "Content-Type: application/json" \
            --data "$PAYLOAD"
          echo "API publish complete."

      - name: Generate and upload update.json
        env:
          VERSION: ${{ steps.version.outputs.version }}
          AND_FN: ${{ needs.build-android.outputs.filename }}
          AND_R2: ${{ needs.build-android.outputs.r2_key }}
          AND_URL: ${{ needs.build-android.outputs.public_url }}
          AND_SHA: ${{ needs.build-android.outputs.sha256 }}
          AND_SZ: ${{ needs.build-android.outputs.size_bytes }}
          WIN_FN: ${{ needs.build-windows.outputs.filename }}
          WIN_R2: ${{ needs.build-windows.outputs.r2_key }}
          WIN_URL: ${{ needs.build-windows.outputs.public_url }}
          AWS_ACCESS_KEY_ID: ${{ secrets.AWS_ACCESS_KEY_ID }}
          AWS_SECRET_ACCESS_KEY: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
        run: |
          jq -n \
            --arg v "$VERSION" \
            --arg andUrl "$AND_URL" --arg andFn "$AND_FN" --arg andR2 "$AND_R2" \
            --arg andSha "$AND_SHA" --argjson andSz "$AND_SZ" \
            --arg winUrl "$WIN_URL" --arg winFn "$WIN_FN" --arg winR2 "$WIN_R2" \
            --arg notes "${{ inputs.summary_en }}" \
            '{
              android: {
                latest_version: $v,
                url: $andUrl,
                release_notes: $notes,
                abis: {
                  arm64_v8a: {
                    url: $andUrl,
                    file_name: $andFn,
                    r2_key: $andR2,
                    size_bytes: $andSz,
                    sha256: $andSha
                  }
                }
              },
              windows: {
                latest_version: $v,
                url: $winUrl,
                release_notes: $notes
              }
            }' > update.json
          cat update.json
          aws s3 cp update.json "s3://${{ secrets.R2_BUCKET_NAME }}/update.json" \
            --endpoint-url "${{ secrets.R2_ENDPOINT_URL }}" \
            --region auto \
            --content-type "application/json"
          echo "update.json uploaded to R2."
