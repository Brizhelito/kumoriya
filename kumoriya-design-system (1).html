<!DOCTYPE html>
<html lang="es" data-palette="cloudy-day" data-typography="serif-rounded" data-icon-style="yuukari" data-universe="anime">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Kumoriya · Design System — Cloudy Cozy</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Zen+Maru+Gothic:wght@400;500;700;900&family=M+PLUS+Rounded+1c:wght@400;500;700;800&family=Hina+Mincho&family=Nunito:wght@400;600;700;800&family=Fredoka:wght@400;500;600;700&family=Quicksand:wght@400;500;600;700&family=Playfair+Display:ital,wght@0,400;0,700;1,400;1,700&family=Inter:wght@400;500;600;700&family=Zen+Kurenaido&family=Klee+One:wght@400;600&family=Zen+Kaku+Gothic+New:wght@400;500;700&family=JetBrains+Mono:wght@400;500;700&display=swap" rel="stylesheet">
<style>
/* ============================================================
   KUMORIYA DESIGN SYSTEM — CSS Variables
   4 paletas · 4 tipografías · 4 estilos de iconos · 2 universos
   ============================================================ */

:root {
  /* === Spacing scale === */
  --space-1: 4px;
  --space-2: 8px;
  --space-3: 12px;
  --space-4: 16px;
  --space-5: 24px;
  --space-6: 32px;
  --space-7: 48px;
  --space-8: 64px;

  /* === Radius === */
  --r-sm: 12px;
  --r-md: 16px;
  --r-lg: 24px;
  --r-xl: 32px;
  --r-pill: 999px;

  /* === Motion === */
  --ease-cloud: cubic-bezier(0.22, 1, 0.36, 1);   /* easeOutQuint */
  --ease-rain: cubic-bezier(0.65, 0, 0.35, 1);    /* easeInOutCubic */
  --dur-fast: 200ms;
  --dur-base: 400ms;
  --dur-slow: 600ms;
  --dur-ambient: 30s;

  /* === Default: Día nublado suave === */
  --bg: #F4F1EC;
  --bg-elev: #FBF9F5;
  --surface: #FFFFFF;
  --surface-2: #EDE9E2;
  --mist: #E8EBF0;
  --text: #2B3144;
  --text-muted: #6B7280;
  --text-soft: #9AA0AE;
  --primary: #5B7BB5;
  --primary-soft: #A8B8D4;
  --accent: #E8A598;
  --accent-soft: #F5CFC6;
  --success: #7FB069;
  --warning: #E6B450;
  --error: #D97B7B;
  --star: #F0C667;

  /* === Default: Serif suave + Sans rounded === */
  --font-display: 'Zen Maru Gothic', 'M PLUS Rounded 1c', serif;
  --font-body: 'M PLUS Rounded 1c', 'Nunito', sans-serif;
  --font-mono: 'JetBrains Mono', monospace;
  --font-weight-display: 700;
  --font-weight-body: 500;

  /* === Cloud shadow (3 capas difusas) === */
  --shadow-cloud-sm: 0 1px 2px rgba(43,49,68,0.04), 0 2px 8px rgba(43,49,68,0.06), 0 8px 24px rgba(43,49,68,0.05);
  --shadow-cloud: 0 2px 4px rgba(43,49,68,0.05), 0 8px 16px rgba(43,49,68,0.07), 0 16px 48px rgba(43,49,68,0.06);
  --shadow-cloud-lg: 0 4px 8px rgba(43,49,68,0.06), 0 16px 32px rgba(43,49,68,0.08), 0 32px 80px rgba(43,49,68,0.08);
  --shadow-cloud-hover: 0 4px 12px rgba(43,49,68,0.08), 0 16px 36px rgba(43,49,68,0.10), 0 32px 80px rgba(43,49,68,0.10);

  /* === Gradient nube === */
  --grad-cloud: linear-gradient(180deg, #FBF9F5 0%, #F4F1EC 50%, #EDE9E2 100%);
  --grad-sky: linear-gradient(180deg, #DDE5EF 0%, #E8EBF0 60%, #F4F1EC 100%);

  /* === Texturas === */
  --washi-texture: url("data:image/svg+xml;utf8,<svg xmlns='http://www.w3.org/2000/svg' width='200' height='200'><filter id='n'><feTurbulence type='fractalNoise' baseFrequency='0.85' numOctaves='2' stitchTiles='stitch'/><feColorMatrix values='0 0 0 0 0.4 0 0 0 0 0.4 0 0 0 0 0.4 0 0 0 0.06 0'/></filter><rect width='200' height='200' filter='url(%23n)'/></svg>");
}

/* ============================================================
   PALETTE VARIANTS — 4 universos cromáticos
   ============================================================ */

/* 1. Día nublado suave (default) */
[data-palette="cloudy-day"] {
  --bg: #F4F1EC;
  --bg-elev: #FBF9F5;
  --surface: #FFFFFF;
  --surface-2: #EDE9E2;
  --mist: #E8EBF0;
  --text: #2B3144;
  --text-muted: #6B7280;
  --text-soft: #9AA0AE;
  --primary: #5B7BB5;
  --primary-soft: #A8B8D4;
  --accent: #E8A598;
  --accent-soft: #F5CFC6;
  --success: #7FB069;
  --warning: #E6B450;
  --error: #D97B7B;
  --star: #F0C667;
  --grad-cloud: linear-gradient(180deg, #FBF9F5 0%, #F4F1EC 50%, #EDE9E2 100%);
  --grad-sky: linear-gradient(180deg, #DDE5EF 0%, #E8EBF0 60%, #F4F1EC 100%);
}

/* 2. Crepúsculo cálido */
[data-palette="warm-twilight"] {
  --bg: #F7EDE6;
  --bg-elev: #FBF3EC;
  --surface: #FFF8F2;
  --surface-2: #F0E0D4;
  --mist: #EAD9CC;
  --text: #3A2A28;
  --text-muted: #7A6258;
  --text-soft: #A89187;
  --primary: #C9927A;
  --primary-soft: #E5C2AF;
  --accent: #D4A574;
  --accent-soft: #EBD0A8;
  --success: #94B87F;
  --warning: #D9A958;
  --error: #C77772;
  --star: #E8B659;
  --grad-cloud: linear-gradient(180deg, #FFF8F2 0%, #F7EDE6 50%, #F0E0D4 100%);
  --grad-sky: linear-gradient(180deg, #EAD9CC 0%, #F0E0D4 60%, #F7EDE6 100%);
}

/* 3. Noche estrellada */
[data-palette="starry-night"] {
  --bg: #1B1B3A;
  --bg-elev: #232352;
  --surface: #2A2A5A;
  --surface-2: #343468;
  --mist: #3D3D78;
  --text: #E8E6F5;
  --text-muted: #B8B5D4;
  --text-soft: #8A87B0;
  --primary: #8A9DD9;
  --primary-soft: #5E6BA8;
  --accent: #E8C668;
  --accent-soft: #C9A855;
  --success: #8FBD7D;
  --warning: #E8C668;
  --error: #E08A8A;
  --star: #FFE9A8;
  --grad-cloud: linear-gradient(180deg, #232352 0%, #1B1B3A 50%, #15152F 100%);
  --grad-sky: linear-gradient(180deg, #2A2A5A 0%, #1B1B3A 60%, #15152F 100%);
  --shadow-cloud-sm: 0 1px 2px rgba(0,0,0,0.3), 0 2px 8px rgba(0,0,0,0.4), 0 8px 24px rgba(0,0,0,0.3);
  --shadow-cloud: 0 2px 4px rgba(0,0,0,0.4), 0 8px 16px rgba(0,0,0,0.5), 0 16px 48px rgba(0,0,0,0.4);
  --shadow-cloud-lg: 0 4px 8px rgba(0,0,0,0.5), 0 16px 32px rgba(0,0,0,0.6), 0 32px 80px rgba(0,0,0,0.5);
  --shadow-cloud-hover: 0 4px 12px rgba(0,0,0,0.5), 0 16px 36px rgba(0,0,0,0.6), 0 32px 80px rgba(0,0,0,0.6);
}

/* 4. Tormenta cozy */
[data-palette="cozy-storm"] {
  --bg: #E8E5E0;
  --bg-elev: #EFEBE5;
  --surface: #F5F1EB;
  --surface-2: #DDD8D0;
  --mist: #CFC9BE;
  --text: #2D2A28;
  --text-muted: #6E675F;
  --text-soft: #9D958A;
  --primary: #8B95A8;
  --primary-soft: #B5BCC8;
  --accent: #E8B59A;
  --accent-soft: #F0D2BD;
  --success: #8AA876;
  --warning: #D9B058;
  --error: #C77A6F;
  --star: #E8C159;
  --grad-cloud: linear-gradient(180deg, #F5F1EB 0%, #E8E5E0 50%, #DDD8D0 100%);
  --grad-sky: linear-gradient(180deg, #CFC9BE 0%, #DDD8D0 60%, #E8E5E0 100%);
}

/* ============================================================
   TYPOGRAPHY VARIANTS — 4 direcciones
   ============================================================ */

[data-typography="serif-rounded"] {
  --font-display: 'Zen Maru Gothic', 'Hina Mincho', serif;
  --font-body: 'M PLUS Rounded 1c', 'Nunito', sans-serif;
  --font-weight-display: 700;
  --font-weight-body: 500;
}

[data-typography="display-cozy"] {
  --font-display: 'Fredoka', 'Baloo 2', sans-serif;
  --font-body: 'Quicksand', sans-serif;
  --font-weight-display: 600;
  --font-weight-body: 500;
}

[data-typography="editorial-cloud"] {
  --font-display: 'Playfair Display', serif;
  --font-body: 'Inter', sans-serif;
  --font-weight-display: 700;
  --font-weight-body: 400;
}

[data-typography="handwritten-home"] {
  --font-display: 'Zen Kurenaido', 'Klee One', cursive;
  --font-body: 'Zen Kaku Gothic New', sans-serif;
  --font-weight-display: 400;
  --font-weight-body: 400;
}

/* ============================================================
   UNIVERSE VARIANTS — Anime (Cielo) vs Manga (Papel)
   ============================================================ */

[data-universe="anime"] {
  --universe-bg: var(--grad-sky);
  --universe-texture: none;
  --universe-overlay: '';
}

[data-universe="manga"] {
  --universe-bg: linear-gradient(180deg, #F0E8D8 0%, #E8DFCB 100%);
  --universe-texture: var(--washi-texture);
  --universe-overlay: 'sepia(0.15) contrast(0.97)';
}

/* ============================================================
   BASE STYLES
   ============================================================ */

* { box-sizing: border-box; margin: 0; padding: 0; }

html { scroll-behavior: smooth; }

body {
  font-family: var(--font-body);
  font-weight: var(--font-weight-body);
  background: var(--bg);
  color: var(--text);
  line-height: 1.6;
  font-size: 16px;
  transition: background var(--dur-slow) var(--ease-cloud), color var(--dur-slow) var(--ease-cloud);
  overflow-x: hidden;
  -webkit-font-smoothing: antialiased;
}

h1, h2, h3, h4 {
  font-family: var(--font-display);
  font-weight: var(--font-weight-display);
  line-height: 1.2;
  letter-spacing: -0.01em;
}

code, pre, .mono {
  font-family: var(--font-mono);
}

::selection { background: var(--accent-soft); color: var(--text); }

/* ============================================================
   LAYOUT — Sections
   ============================================================ */

.section {
  max-width: 1280px;
  margin: 0 auto;
  padding: var(--space-7) var(--space-5);
  position: relative;
}

.section-label {
  display: inline-flex;
  align-items: center;
  gap: var(--space-2);
  font-family: var(--font-mono);
  font-size: 12px;
  text-transform: uppercase;
  letter-spacing: 0.12em;
  color: var(--text-muted);
  padding: 6px 14px;
  background: var(--surface);
  border-radius: var(--r-pill);
  box-shadow: var(--shadow-cloud-sm);
  margin-bottom: var(--space-4);
}

.section-title {
  font-size: clamp(28px, 4vw, 42px);
  margin-bottom: var(--space-3);
  color: var(--text);
}

.section-sub {
  font-size: 17px;
  color: var(--text-muted);
  max-width: 680px;
  margin-bottom: var(--space-6);
  line-height: 1.65;
}

.section-divider {
  height: 1px;
  background: linear-gradient(90deg, transparent, var(--text-soft), transparent);
  opacity: 0.3;
  margin: var(--space-7) 0;
}

/* ============================================================
   THEME SWITCHER — Sticky control bar
   ============================================================ */

.theme-switcher {
  position: sticky;
  top: 0;
  z-index: 1000;
  background: rgba(255,255,255,0.85);
  backdrop-filter: blur(20px) saturate(1.2);
  -webkit-backdrop-filter: blur(20px) saturate(1.2);
  border-bottom: 1px solid var(--surface-2);
  padding: 12px var(--space-5);
  transition: background var(--dur-base) var(--ease-cloud), border-color var(--dur-base) var(--ease-cloud);
}

[data-palette="starry-night"] .theme-switcher {
  background: rgba(27,27,58,0.85);
}

.theme-switcher-inner {
  max-width: 1280px;
  margin: 0 auto;
  display: flex;
  flex-wrap: wrap;
  gap: 16px;
  align-items: center;
  justify-content: space-between;
}

.switcher-brand {
  display: flex;
  align-items: center;
  gap: 10px;
  font-family: var(--font-display);
  font-weight: 700;
  font-size: 18px;
}

.switcher-brand-mark {
  width: 28px;
  height: 28px;
  display: grid;
  place-items: center;
}

.switcher-groups {
  display: flex;
  flex-wrap: wrap;
  gap: 10px;
  align-items: center;
}

.switcher-group {
  display: flex;
  align-items: center;
  gap: 6px;
  padding: 4px;
  background: var(--surface-2);
  border-radius: var(--r-pill);
  transition: background var(--dur-base) var(--ease-cloud);
}

.switcher-group-label {
  font-family: var(--font-mono);
  font-size: 10px;
  text-transform: uppercase;
  letter-spacing: 0.1em;
  color: var(--text-soft);
  padding: 0 8px 0 6px;
}

.switcher-btn {
  border: none;
  background: transparent;
  color: var(--text-muted);
  font-family: var(--font-body);
  font-size: 12px;
  font-weight: 600;
  padding: 6px 12px;
  border-radius: var(--r-pill);
  cursor: pointer;
  transition: all var(--dur-fast) var(--ease-cloud);
  display: flex;
  align-items: center;
  gap: 6px;
  white-space: nowrap;
}

.switcher-btn:hover {
  color: var(--text);
  background: var(--surface);
}

.switcher-btn.active {
  background: var(--surface);
  color: var(--text);
  box-shadow: var(--shadow-cloud-sm);
}

.switcher-swatch {
  width: 12px;
  height: 12px;
  border-radius: 50%;
  border: 1.5px solid rgba(0,0,0,0.06);
}

.sw-cd { background: linear-gradient(135deg, #F4F1EC, #A8B8D4); }
.sw-wt { background: linear-gradient(135deg, #F7EDE6, #D4A574); }
.sw-sn { background: linear-gradient(135deg, #1B1B3A, #E8C668); }
.sw-cs { background: linear-gradient(135deg, #E8E5E0, #8B95A8); }

/* ============================================================
   HERO
   ============================================================ */

.hero {
  position: relative;
  min-height: 90vh;
  display: flex;
  flex-direction: column;
  justify-content: center;
  overflow: hidden;
  background: var(--grad-sky);
  transition: background var(--dur-slow) var(--ease-cloud);
}

.hero-clouds {
  position: absolute;
  inset: 0;
  pointer-events: none;
  z-index: 1;
}

.cloud {
  position: absolute;
  background: radial-gradient(ellipse at center, rgba(255,255,255,0.9) 0%, rgba(255,255,255,0) 70%);
  filter: blur(20px);
  border-radius: 50%;
  animation: drift var(--dur-ambient) linear infinite;
}

.cloud-1 { width: 400px; height: 200px; top: 10%; left: -100px; animation-duration: 45s; }
.cloud-2 { width: 300px; height: 150px; top: 30%; right: -50px; animation-duration: 60s; animation-delay: -10s; }
.cloud-3 { width: 500px; height: 220px; bottom: 15%; left: 20%; animation-duration: 80s; animation-delay: -25s; opacity: 0.7; }

@keyframes drift {
  from { transform: translateX(-100px); }
  to { transform: translateX(calc(100vw + 100px)); }
}

.hero-stars {
  position: absolute;
  inset: 0;
  z-index: 0;
}

.star {
  position: absolute;
  width: 2px;
  height: 2px;
  background: var(--star);
  border-radius: 50%;
  opacity: 0;
  animation: twinkle 4s ease-in-out infinite;
}

@keyframes twinkle {
  0%, 100% { opacity: 0; transform: scale(0.5); }
  50% { opacity: 0.8; transform: scale(1); }
}

.hero-content {
  position: relative;
  z-index: 2;
  max-width: 1280px;
  margin: 0 auto;
  padding: 0 var(--space-5);
  text-align: center;
}

.hero-jp {
  font-family: var(--font-display);
  font-size: clamp(20px, 3vw, 28px);
  color: var(--accent);
  letter-spacing: 0.3em;
  margin-bottom: var(--space-3);
  font-weight: 400;
}

.hero-title {
  font-size: clamp(56px, 12vw, 140px);
  line-height: 0.95;
  letter-spacing: -0.03em;
  margin-bottom: var(--space-4);
  color: var(--text);
}

.hero-tagline {
  font-size: clamp(18px, 2.2vw, 24px);
  color: var(--text-muted);
  max-width: 600px;
  margin: 0 auto var(--space-6);
  line-height: 1.5;
}

.hero-cta {
  display: inline-flex;
  align-items: center;
  gap: var(--space-2);
  padding: 14px 28px;
  background: var(--text);
  color: var(--bg);
  border: none;
  border-radius: var(--r-pill);
  font-family: var(--font-body);
  font-weight: 700;
  font-size: 15px;
  cursor: pointer;
  box-shadow: var(--shadow-cloud);
  transition: all var(--dur-base) var(--ease-cloud);
}

.hero-cta:hover {
  transform: translateY(-2px);
  box-shadow: var(--shadow-cloud-hover);
}

.hero-meta {
  position: absolute;
  bottom: var(--space-5);
  left: 50%;
  transform: translateX(-50%);
  z-index: 2;
  display: flex;
  gap: var(--space-5);
  font-family: var(--font-mono);
  font-size: 11px;
  text-transform: uppercase;
  letter-spacing: 0.15em;
  color: var(--text-soft);
}

/* ============================================================
   CONCEPT CARDS
   ============================================================ */

.concept-grid {
  display: grid;
  grid-template-columns: repeat(auto-fit, minmax(280px, 1fr));
  gap: var(--space-4);
  margin-top: var(--space-5);
}

.concept-card {
  padding: var(--space-5);
  background: var(--surface);
  border-radius: var(--r-lg);
  box-shadow: var(--shadow-cloud-sm);
  transition: all var(--dur-base) var(--ease-cloud);
}

.concept-card:hover {
  transform: translateY(-4px);
  box-shadow: var(--shadow-cloud);
}

.concept-card-icon {
  width: 48px;
  height: 48px;
  display: grid;
  place-items: center;
  background: var(--accent-soft);
  border-radius: var(--r-md);
  margin-bottom: var(--space-3);
  color: var(--text);
}

.concept-card h3 {
  font-size: 18px;
  margin-bottom: var(--space-2);
}

.concept-card p {
  font-size: 14px;
  color: var(--text-muted);
  line-height: 1.6;
}

/* ============================================================
   FOUNDATIONS — Color
   ============================================================ */

.color-grid {
  display: grid;
  grid-template-columns: repeat(auto-fill, minmax(180px, 1fr));
  gap: var(--space-3);
}

.color-chip {
  background: var(--surface);
  border-radius: var(--r-md);
  overflow: hidden;
  box-shadow: var(--shadow-cloud-sm);
  transition: transform var(--dur-base) var(--ease-cloud);
}

.color-chip:hover { transform: translateY(-2px); }

.color-swatch {
  height: 80px;
  display: flex;
  align-items: flex-end;
  padding: 8px 12px;
}

.color-chip-meta {
  padding: 10px 12px;
}

.color-chip-name {
  font-family: var(--font-mono);
  font-size: 11px;
  text-transform: uppercase;
  letter-spacing: 0.08em;
  color: var(--text);
  margin-bottom: 2px;
}

.color-chip-hex {
  font-family: var(--font-mono);
  font-size: 11px;
  color: var(--text-soft);
}

/* ============================================================
   FOUNDATIONS — Typography
   ============================================================ */

.type-stack {
  display: grid;
  gap: var(--space-3);
}

.type-row {
  display: grid;
  grid-template-columns: 100px 1fr;
  gap: var(--space-4);
  align-items: baseline;
  padding: var(--space-4);
  background: var(--surface);
  border-radius: var(--r-md);
  box-shadow: var(--shadow-cloud-sm);
}

.type-label {
  font-family: var(--font-mono);
  font-size: 11px;
  text-transform: uppercase;
  letter-spacing: 0.1em;
  color: var(--text-soft);
}

.type-sample-display { font-family: var(--font-display); font-weight: var(--font-weight-display); font-size: 48px; line-height: 1.1; }
.type-sample-h1 { font-family: var(--font-display); font-weight: var(--font-weight-display); font-size: 32px; line-height: 1.2; }
.type-sample-h2 { font-family: var(--font-display); font-weight: var(--font-weight-display); font-size: 24px; line-height: 1.3; }
.type-sample-body { font-family: var(--font-body); font-weight: var(--font-weight-body); font-size: 16px; line-height: 1.6; }
.type-sample-caption { font-family: var(--font-body); font-weight: var(--font-weight-body); font-size: 12px; color: var(--text-muted); }

/* ============================================================
   FOUNDATIONS — Iconography
   ============================================================ */

.icon-grid {
  display: grid;
  grid-template-columns: repeat(auto-fill, minmax(110px, 1fr));
  gap: var(--space-3);
}

.icon-cell {
  display: flex;
  flex-direction: column;
  align-items: center;
  gap: var(--space-2);
  padding: var(--space-4);
  background: var(--surface);
  border-radius: var(--r-md);
  box-shadow: var(--shadow-cloud-sm);
  transition: all var(--dur-base) var(--ease-cloud);
}

.icon-cell:hover {
  transform: translateY(-2px);
  box-shadow: var(--shadow-cloud);
}

.icon-cell svg {
  width: 28px;
  height: 28px;
  color: var(--text);
}

.icon-cell-name {
  font-family: var(--font-mono);
  font-size: 10px;
  text-transform: uppercase;
  letter-spacing: 0.08em;
  color: var(--text-soft);
}

/* ============================================================
   COMPONENTS showcase
   ============================================================ */

.comp-row {
  display: flex;
  flex-wrap: wrap;
  gap: var(--space-4);
  align-items: center;
  padding: var(--space-5);
  background: var(--surface);
  border-radius: var(--r-lg);
  box-shadow: var(--shadow-cloud-sm);
  margin-bottom: var(--space-4);
}

.comp-row-label {
  font-family: var(--font-mono);
  font-size: 11px;
  text-transform: uppercase;
  letter-spacing: 0.1em;
  color: var(--text-soft);
  min-width: 100px;
}

/* === CloudButton === */
.btn {
  display: inline-flex;
  align-items: center;
  gap: 8px;
  padding: 12px 22px;
  font-family: var(--font-body);
  font-weight: 700;
  font-size: 14px;
  border: none;
  border-radius: var(--r-pill);
  cursor: pointer;
  transition: all var(--dur-base) var(--ease-cloud);
}

.btn-primary {
  background: var(--text);
  color: var(--bg);
  box-shadow: var(--shadow-cloud-sm);
}

.btn-primary:hover {
  transform: translateY(-1px);
  box-shadow: var(--shadow-cloud);
}

.btn-secondary {
  background: var(--accent);
  color: var(--text);
  box-shadow: var(--shadow-cloud-sm);
}

.btn-secondary:hover {
  background: var(--accent-soft);
  transform: translateY(-1px);
}

.btn-ghost {
  background: transparent;
  color: var(--text);
  border: 1.5px solid var(--surface-2);
}

.btn-ghost:hover {
  background: var(--surface-2);
}

/* === Chips === */
.chip {
  display: inline-flex;
  align-items: center;
  gap: 6px;
  padding: 6px 12px;
  font-family: var(--font-body);
  font-size: 12px;
  font-weight: 600;
  border-radius: var(--r-pill);
  background: var(--surface-2);
  color: var(--text);
}

.chip-airing { background: var(--success); color: white; }
.chip-finished { background: var(--text-soft); color: white; }
.chip-upcoming { background: var(--warning); color: white; }
.chip-tag { background: var(--primary-soft); color: var(--text); }
.chip-rating { background: var(--accent-soft); color: var(--text); }
.chip-rating svg { width: 12px; height: 12px; color: var(--star); }

/* === SearchBar === */
.search {
  display: flex;
  align-items: center;
  gap: 10px;
  padding: 12px 16px;
  background: var(--surface-2);
  border-radius: var(--r-pill);
  min-width: 280px;
  transition: all var(--dur-base) var(--ease-cloud);
}

.search:focus-within {
  background: var(--surface);
  box-shadow: var(--shadow-cloud-sm);
  outline: 2px solid var(--primary-soft);
}

.search svg { width: 18px; height: 18px; color: var(--text-soft); flex-shrink: 0; }

.search input {
  border: none;
  background: transparent;
  font-family: var(--font-body);
  font-size: 14px;
  color: var(--text);
  outline: none;
  width: 100%;
}

.search input::placeholder { color: var(--text-soft); }

.search-kbd {
  font-family: var(--font-mono);
  font-size: 10px;
  padding: 2px 6px;
  background: var(--surface);
  border-radius: 4px;
  color: var(--text-soft);
  box-shadow: var(--shadow-cloud-sm);
}

/* === CloudCard === */
.cloud-card {
  background: var(--grad-cloud);
  border-radius: var(--r-lg);
  box-shadow: var(--shadow-cloud);
  overflow: hidden;
  transition: all var(--dur-base) var(--ease-cloud);
  cursor: pointer;
}

.cloud-card:hover {
  transform: translateY(-6px);
  box-shadow: var(--shadow-cloud-hover);
}

.cloud-card-poster {
  position: relative;
  width: 180px;
  aspect-ratio: 2/3;
  overflow: hidden;
}

.cloud-card-poster img {
  width: 100%;
  height: 100%;
  object-fit: cover;
  transition: transform var(--dur-slow) var(--ease-cloud);
}

.cloud-card:hover .cloud-card-poster img { transform: scale(1.05); }

.cloud-card-badge {
  position: absolute;
  top: 10px;
  left: 10px;
  padding: 4px 10px;
  background: rgba(0,0,0,0.6);
  color: white;
  border-radius: var(--r-pill);
  font-family: var(--font-mono);
  font-size: 10px;
  text-transform: uppercase;
  letter-spacing: 0.08em;
  backdrop-filter: blur(8px);
}

.cloud-card-info {
  padding: 14px;
}

.cloud-card-title {
  font-family: var(--font-display);
  font-weight: var(--font-weight-display);
  font-size: 15px;
  margin-bottom: 4px;
  color: var(--text);
}

.cloud-card-meta {
  font-family: var(--font-body);
  font-size: 12px;
  color: var(--text-muted);
  display: flex;
  gap: 8px;
  align-items: center;
}

/* === BottomNav (mock mobile) === */
.bottom-nav {
  display: flex;
  justify-content: space-around;
  align-items: center;
  background: var(--surface);
  border-radius: var(--r-pill);
  padding: 8px;
  box-shadow: var(--shadow-cloud);
  position: relative;
}

.nav-item {
  display: flex;
  flex-direction: column;
  align-items: center;
  gap: 2px;
  padding: 8px 16px;
  background: transparent;
  border: none;
  cursor: pointer;
  border-radius: var(--r-pill);
  font-family: var(--font-body);
  font-size: 10px;
  font-weight: 600;
  color: var(--text-soft);
  transition: all var(--dur-base) var(--ease-cloud);
}

.nav-item.active {
  background: var(--accent-soft);
  color: var(--text);
}

.nav-item svg { width: 22px; height: 22px; }

/* ============================================================
   MOBILE MOCKUPS
   ============================================================ */

.mockup-row {
  display: flex;
  flex-wrap: wrap;
  gap: var(--space-5);
  justify-content: center;
  margin: var(--space-5) 0;
}

.phone {
  width: 320px;
  height: 640px;
  background: var(--bg);
  border-radius: 40px;
  padding: 12px;
  box-shadow: var(--shadow-cloud-lg), inset 0 0 0 2px var(--surface-2);
  position: relative;
  overflow: hidden;
  transition: all var(--dur-slow) var(--ease-cloud);
}

.phone-screen {
  width: 100%;
  height: 100%;
  background: var(--bg);
  border-radius: 30px;
  overflow: hidden;
  position: relative;
  display: flex;
  flex-direction: column;
}

.phone-notch {
  position: absolute;
  top: 12px;
  left: 50%;
  transform: translateX(-50%);
  width: 100px;
  height: 22px;
  background: var(--surface-2);
  border-radius: 0 0 16px 16px;
  z-index: 10;
}

.phone-content {
  flex: 1;
  overflow: hidden;
  padding-top: 40px;
  position: relative;
}

.phone-statusbar {
  position: absolute;
  top: 16px;
  left: 24px;
  right: 24px;
  display: flex;
  justify-content: space-between;
  font-family: var(--font-mono);
  font-size: 10px;
  color: var(--text);
  z-index: 11;
}

.phone-app {
  height: 100%;
  overflow-y: auto;
  padding: 0 14px 80px;
}

.phone-app::-webkit-scrollbar { display: none; }

.app-header {
  display: flex;
  justify-content: space-between;
  align-items: center;
  padding: 12px 0 16px;
}

.app-greeting {
  font-family: var(--font-display);
  font-size: 18px;
  font-weight: var(--font-weight-display);
  line-height: 1.2;
}

.app-greeting-sub {
  font-size: 11px;
  color: var(--text-muted);
  font-weight: 400;
}

.app-avatar {
  width: 36px;
  height: 36px;
  border-radius: 50%;
  background: var(--accent-soft);
  display: grid;
  place-items: center;
  font-family: var(--font-display);
  font-weight: 700;
  font-size: 14px;
  color: var(--text);
}

.app-hero-card {
  position: relative;
  height: 180px;
  border-radius: var(--r-md);
  overflow: hidden;
  margin-bottom: 16px;
  background: var(--grad-sky);
}

.app-hero-card-bg {
  position: absolute;
  inset: 0;
  background: linear-gradient(135deg, var(--primary), var(--accent));
  opacity: 0.85;
}

.app-hero-card-content {
  position: relative;
  z-index: 2;
  height: 100%;
  display: flex;
  flex-direction: column;
  justify-content: flex-end;
  padding: 16px;
  color: white;
}

.app-hero-card-tag {
  display: inline-flex;
  align-self: flex-start;
  padding: 3px 10px;
  background: rgba(255,255,255,0.25);
  backdrop-filter: blur(10px);
  border-radius: var(--r-pill);
  font-family: var(--font-mono);
  font-size: 9px;
  text-transform: uppercase;
  letter-spacing: 0.1em;
  margin-bottom: 8px;
}

.app-hero-card-title {
  font-family: var(--font-display);
  font-weight: var(--font-weight-display);
  font-size: 18px;
  line-height: 1.15;
  margin-bottom: 4px;
}

.app-hero-card-meta {
  font-size: 11px;
  opacity: 0.85;
}

.app-section-title {
  display: flex;
  justify-content: space-between;
  align-items: center;
  font-family: var(--font-display);
  font-weight: var(--font-weight-display);
  font-size: 14px;
  margin: 18px 0 10px;
}

.app-section-link {
  font-family: var(--font-mono);
  font-size: 10px;
  text-transform: uppercase;
  color: var(--text-muted);
}

.app-card-row {
  display: flex;
  gap: 10px;
  overflow-x: auto;
  padding-bottom: 6px;
  margin: 0 -14px;
  padding-left: 14px;
  padding-right: 14px;
}

.app-card-row::-webkit-scrollbar { display: none; }

.app-mini-card {
  flex-shrink: 0;
  width: 100px;
  background: var(--surface);
  border-radius: var(--r-md);
  overflow: hidden;
  box-shadow: var(--shadow-cloud-sm);
}

.app-mini-poster {
  height: 140px;
  background: linear-gradient(135deg, var(--primary-soft), var(--accent-soft));
  position: relative;
}

.app-mini-poster.ep2 { background: linear-gradient(135deg, var(--accent-soft), var(--primary-soft)); }
.app-mini-poster.ep3 { background: linear-gradient(135deg, var(--success), var(--primary-soft)); }
.app-mini-poster.ep4 { background: linear-gradient(135deg, var(--warning), var(--accent)); }

.app-mini-info {
  padding: 8px 10px;
}

.app-mini-title {
  font-family: var(--font-display);
  font-weight: var(--font-weight-display);
  font-size: 11px;
  line-height: 1.2;
  margin-bottom: 2px;
  white-space: nowrap;
  overflow: hidden;
  text-overflow: ellipsis;
}

.app-mini-meta {
  font-size: 9px;
  color: var(--text-muted);
}

.app-continue-card {
  display: flex;
  align-items: center;
  gap: 12px;
  padding: 10px;
  background: var(--surface);
  border-radius: var(--r-md);
  box-shadow: var(--shadow-cloud-sm);
  margin-bottom: 8px;
}

.app-continue-poster {
  width: 50px;
  height: 64px;
  border-radius: var(--r-sm);
  background: linear-gradient(135deg, var(--primary), var(--accent));
  flex-shrink: 0;
}

.app-continue-info { flex: 1; min-width: 0; }
.app-continue-title {
  font-family: var(--font-display);
  font-weight: var(--font-weight-display);
  font-size: 12px;
  margin-bottom: 2px;
  white-space: nowrap;
  overflow: hidden;
  text-overflow: ellipsis;
}
.app-continue-ep { font-size: 10px; color: var(--text-muted); margin-bottom: 4px; }

.app-continue-progress {
  height: 3px;
  background: var(--surface-2);
  border-radius: var(--r-pill);
  overflow: hidden;
}

.app-continue-progress-bar {
  height: 100%;
  background: var(--accent);
  border-radius: var(--r-pill);
}

.app-bottom-nav {
  position: absolute;
  bottom: 14px;
  left: 14px;
  right: 14px;
  display: flex;
  justify-content: space-around;
  align-items: center;
  background: var(--surface);
  border-radius: var(--r-pill);
  padding: 6px;
  box-shadow: var(--shadow-cloud);
}

.app-nav-item {
  display: flex;
  flex-direction: column;
  align-items: center;
  gap: 1px;
  padding: 6px 10px;
  background: transparent;
  border: none;
  cursor: pointer;
  border-radius: var(--r-pill);
  font-family: var(--font-body);
  font-size: 9px;
  font-weight: 600;
  color: var(--text-soft);
}

.app-nav-item.active {
  background: var(--accent-soft);
  color: var(--text);
}

.app-nav-item svg { width: 18px; height: 18px; }

/* ============================================================
   COMPARISON — Anime vs Manga universes
   ============================================================ */

.universe-compare {
  display: grid;
  grid-template-columns: 1fr 1fr;
  gap: var(--space-4);
  margin: var(--space-5) 0;
}

@media (max-width: 768px) {
  .universe-compare { grid-template-columns: 1fr; }
}

.universe-panel {
  padding: var(--space-5);
  border-radius: var(--r-lg);
  position: relative;
  overflow: hidden;
  min-height: 360px;
}

.universe-panel-anime {
  background: linear-gradient(180deg, #DDE5EF 0%, #C8D4E8 50%, #B5C5DD 100%);
  color: var(--text);
}

.universe-panel-manga {
  background: linear-gradient(180deg, #F0E8D8 0%, #E8DFCB 50%, #D8CFB8 100%);
  color: #3D3328;
  position: relative;
}

.universe-panel-manga::after {
  content: '';
  position: absolute;
  inset: 0;
  background-image: var(--washi-texture);
  opacity: 0.4;
  pointer-events: none;
}

.universe-panel-label {
  display: inline-block;
  font-family: var(--font-mono);
  font-size: 10px;
  text-transform: uppercase;
  letter-spacing: 0.15em;
  padding: 4px 10px;
  background: rgba(255,255,255,0.5);
  backdrop-filter: blur(8px);
  border-radius: var(--r-pill);
  margin-bottom: var(--space-3);
  position: relative;
  z-index: 2;
}

.universe-panel-title {
  font-family: var(--font-display);
  font-weight: var(--font-weight-display);
  font-size: 24px;
  margin-bottom: var(--space-2);
  position: relative;
  z-index: 2;
}

.universe-panel-desc {
  font-size: 13px;
  line-height: 1.6;
  margin-bottom: var(--space-4);
  max-width: 320px;
  position: relative;
  z-index: 2;
}

.universe-panel-demo {
  position: relative;
  z-index: 2;
}

/* ============================================================
   DESKTOP MOCKUP
   ============================================================ */

.desktop-frame {
  width: 100%;
  max-width: 1100px;
  margin: var(--space-5) auto;
  background: var(--bg);
  border-radius: 16px;
  box-shadow: var(--shadow-cloud-lg);
  overflow: hidden;
  border: 1px solid var(--surface-2);
}

.desktop-bar {
  display: flex;
  align-items: center;
  gap: 12px;
  padding: 12px 18px;
  background: var(--surface);
  border-bottom: 1px solid var(--surface-2);
}

.desktop-dots { display: flex; gap: 6px; }
.desktop-dot { width: 11px; height: 11px; border-radius: 50%; background: var(--surface-2); }
.desktop-dot:nth-child(1) { background: #FF6058; }
.desktop-dot:nth-child(2) { background: #FFBC2C; }
.desktop-dot:nth-child(3) { background: #28C840; }

.desktop-url {
  flex: 1;
  background: var(--surface-2);
  border-radius: var(--r-pill);
  padding: 6px 14px;
  font-family: var(--font-mono);
  font-size: 11px;
  color: var(--text-muted);
  max-width: 400px;
  margin: 0 auto;
}

.desktop-body {
  display: grid;
  grid-template-columns: 220px 1fr;
  min-height: 580px;
}

.desktop-sidebar {
  background: var(--surface);
  padding: 20px 16px;
  border-right: 1px solid var(--surface-2);
}

.desktop-brand {
  display: flex;
  align-items: center;
  gap: 10px;
  font-family: var(--font-display);
  font-weight: var(--font-weight-display);
  font-size: 18px;
  padding: 0 8px 20px;
}

.desktop-nav {
  display: flex;
  flex-direction: column;
  gap: 4px;
}

.desktop-nav-item {
  display: flex;
  align-items: center;
  gap: 10px;
  padding: 9px 12px;
  border-radius: var(--r-sm);
  font-family: var(--font-body);
  font-size: 13px;
  font-weight: 500;
  color: var(--text-muted);
  cursor: pointer;
  transition: all var(--dur-fast) var(--ease-cloud);
}

.desktop-nav-item:hover { background: var(--surface-2); color: var(--text); }
.desktop-nav-item.active { background: var(--accent-soft); color: var(--text); }
.desktop-nav-item svg { width: 18px; height: 18px; }

.desktop-main {
  padding: 24px 28px;
  overflow-y: auto;
}

.desktop-page-title {
  font-family: var(--font-display);
  font-weight: var(--font-weight-display);
  font-size: 28px;
  margin-bottom: 4px;
}

.desktop-page-sub {
  font-size: 13px;
  color: var(--text-muted);
  margin-bottom: 20px;
}

.desktop-grid {
  display: grid;
  grid-template-columns: repeat(auto-fill, minmax(160px, 1fr));
  gap: 14px;
  margin-bottom: 24px;
}

.desktop-card {
  background: var(--grad-cloud);
  border-radius: var(--r-md);
  box-shadow: var(--shadow-cloud-sm);
  overflow: hidden;
  transition: all var(--dur-base) var(--ease-cloud);
}

.desktop-card:hover { transform: translateY(-3px); box-shadow: var(--shadow-cloud); }

.desktop-card-poster {
  aspect-ratio: 2/3;
  background: linear-gradient(135deg, var(--primary-soft), var(--accent));
}

.desktop-card-poster.p2 { background: linear-gradient(135deg, var(--accent), var(--warning)); }
.desktop-card-poster.p3 { background: linear-gradient(135deg, var(--primary), var(--primary-soft)); }
.desktop-card-poster.p4 { background: linear-gradient(135deg, var(--success), var(--primary-soft)); }
.desktop-card-poster.p5 { background: linear-gradient(135deg, var(--accent-soft), var(--primary-soft)); }
.desktop-card-poster.p6 { background: linear-gradient(135deg, var(--warning), var(--accent)); }

.desktop-card-info { padding: 8px 10px; }
.desktop-card-title {
  font-family: var(--font-display);
  font-weight: var(--font-weight-display);
  font-size: 12px;
  margin-bottom: 2px;
  white-space: nowrap;
  overflow: hidden;
  text-overflow: ellipsis;
}
.desktop-card-meta { font-size: 10px; color: var(--text-muted); }

/* ============================================================
   CODE BLOCKS — Dart
   ============================================================ */

.code-tabs {
  display: flex;
  gap: 4px;
  margin-bottom: 0;
  padding: 4px 4px 0;
  background: var(--surface);
  border-radius: var(--r-md) var(--r-md) 0 0;
  box-shadow: var(--shadow-cloud-sm);
  overflow-x: auto;
}

.code-tab {
  padding: 10px 16px;
  font-family: var(--font-mono);
  font-size: 12px;
  font-weight: 600;
  color: var(--text-muted);
  background: transparent;
  border: none;
  border-radius: 8px 8px 0 0;
  cursor: pointer;
  white-space: nowrap;
  transition: all var(--dur-fast) var(--ease-cloud);
}

.code-tab.active {
  background: var(--surface-2);
  color: var(--text);
}

.code-block {
  background: #1F2233;
  border-radius: 0 0 var(--r-md) var(--r-md);
  padding: 20px;
  overflow-x: auto;
  font-family: var(--font-mono);
  font-size: 13px;
  line-height: 1.6;
  color: #D8DAE6;
  box-shadow: var(--shadow-cloud);
  margin-bottom: var(--space-5);
}

.code-block pre { margin: 0; white-space: pre; }

.code-block .kw { color: #C792EA; }
.code-block .str { color: #C3E88D; }
.code-block .num { color: #F78C6C; }
.code-block .com { color: #6B7394; font-style: italic; }
.code-block .cls { color: #82AAFF; }
.code-block .fn { color: #82AAFF; }
.code-block .var { color: #FFCB6B; }
.code-block .at { color: #FFCB6B; }
.code-block .pun { color: #89DDFF; }

.code-copy {
  float: right;
  padding: 6px 12px;
  background: rgba(255,255,255,0.1);
  border: 1px solid rgba(255,255,255,0.15);
  color: #D8DAE6;
  border-radius: 6px;
  font-family: var(--font-mono);
  font-size: 11px;
  cursor: pointer;
  transition: all var(--dur-fast) var(--ease-cloud);
}

.code-copy:hover { background: rgba(255,255,255,0.15); }

/* ============================================================
   MOTION SHOWCASE
   ============================================================ */

.motion-grid {
  display: grid;
  grid-template-columns: repeat(auto-fill, minmax(220px, 1fr));
  gap: var(--space-4);
}

.motion-card {
  padding: var(--space-5);
  background: var(--surface);
  border-radius: var(--r-lg);
  box-shadow: var(--shadow-cloud-sm);
  text-align: center;
  position: relative;
  overflow: hidden;
  min-height: 200px;
  display: flex;
  flex-direction: column;
  justify-content: space-between;
}

.motion-demo {
  flex: 1;
  display: grid;
  place-items: center;
  padding: 20px;
  position: relative;
  overflow: hidden;
}

.motion-label {
  font-family: var(--font-display);
  font-weight: var(--font-weight-display);
  font-size: 14px;
  margin-bottom: 4px;
}

.motion-spec {
  font-family: var(--font-mono);
  font-size: 10px;
  color: var(--text-soft);
  text-transform: uppercase;
  letter-spacing: 0.08em;
}

.motion-ball {
  width: 40px;
  height: 40px;
  border-radius: 50%;
  background: var(--accent);
  box-shadow: var(--shadow-cloud);
}

.motion-card-drift:hover .motion-ball {
  animation: ballDrift 2s var(--ease-cloud) infinite;
}

@keyframes ballDrift {
  0%, 100% { transform: translateX(-30px); }
  50% { transform: translateX(30px); }
}

.motion-card-twinkle .motion-ball {
  animation: ballTwinkle 2.5s ease-in-out infinite;
  background: var(--star);
}

@keyframes ballTwinkle {
  0%, 100% { opacity: 0.3; transform: scale(0.8); }
  50% { opacity: 1; transform: scale(1.2); box-shadow: 0 0 20px var(--star); }
}

.motion-card-lift:hover .motion-ball {
  animation: ballLift 1s var(--ease-cloud);
}

@keyframes ballLift {
  0% { transform: translateY(0); }
  50% { transform: translateY(-20px); }
  100% { transform: translateY(0); }
}

.motion-card-pulse .motion-ball {
  animation: ballPulse 2s ease-in-out infinite;
}

@keyframes ballPulse {
  0%, 100% { transform: scale(1); box-shadow: 0 0 0 0 var(--accent-soft); }
  50% { transform: scale(1.05); box-shadow: 0 0 0 20px rgba(232, 165, 152, 0); }
}

/* ============================================================
   CLOSING
   ============================================================ */

.closing {
  text-align: center;
  padding: var(--space-7) var(--space-5);
  background: var(--grad-cloud);
  border-radius: var(--r-xl);
  margin: var(--space-7) 0;
  box-shadow: var(--shadow-cloud-sm);
}

.closing-jp {
  font-family: var(--font-display);
  font-size: 24px;
  color: var(--accent);
  letter-spacing: 0.3em;
  margin-bottom: var(--space-3);
}

.closing h2 {
  font-size: 36px;
  margin-bottom: var(--space-3);
}

.closing p {
  font-size: 16px;
  color: var(--text-muted);
  max-width: 580px;
  margin: 0 auto var(--space-5);
  line-height: 1.65;
}

/* ============================================================
   UTIL
   ============================================================ */

.muted { color: var(--text-muted); }
.mono { font-family: var(--font-mono); }
.flex { display: flex; }
.gap-2 { gap: var(--space-2); }
.gap-3 { gap: var(--space-3); }
.mt-3 { margin-top: var(--space-3); }
.mt-4 { margin-top: var(--space-4); }
.mt-5 { margin-top: var(--space-5); }

@media (max-width: 768px) {
  .type-row { grid-template-columns: 1fr; gap: var(--space-2); }
  .comp-row { flex-direction: column; align-items: stretch; }
  .comp-row-label { margin-bottom: 4px; }
  .theme-switcher-inner { flex-direction: column; align-items: stretch; }
  .switcher-groups { justify-content: center; }
}

</style>
</head>

      </div>
      <span>Kumoriya</span>
    </div>
    <div class="switcher-groups">
      <div class="switcher-group">
        <span class="switcher-group-label">Paleta</span>
        <button class="switcher-btn active" data-set="palette" data-val="cloudy-day"><span class="switcher-swatch sw-cd"></span>Nublado</button>
        <button class="switcher-btn" data-set="palette" data-val="warm-twilight"><span class="switcher-swatch sw-wt"></span>Crepúsculo</button>
        <button class="switcher-btn" data-set="palette" data-val="starry-night"><span class="switcher-swatch sw-sn"></span>Noche</button>
        <button class="switcher-btn" data-set="palette" data-val="cozy-storm"><span class="switcher-swatch sw-cs"></span>Tormenta</button>
      </div>
      <div class="switcher-group">
        <span class="switcher-group-label">Tipo</span>
        <button class="switcher-btn active" data-set="typography" data-val="serif-rounded">Serif JP</button>
        <button class="switcher-btn" data-set="typography" data-val="display-cozy">Cozy</button>
        <button class="switcher-btn" data-set="typography" data-val="editorial-cloud">Editorial</button>
        <button class="switcher-btn" data-set="typography" data-val="handwritten-home">Manuscrita</button>
      </div>
      <div class="switcher-group">
        <span class="switcher-group-label">Universo</span>
        <button class="switcher-btn active" data-set="universe" data-val="anime">Anime · Cielo</button>

<!-- BODY CONTENT WILL BE INJECTED HERE -->
<main id="content">
  <span style="color: var(--text-muted); padding: 40px;">Cargando…</span>
</main>

<script>
/* ============================================================
   THEME SWITCHER LOGIC
   ============================================================ */
document.querySelectorAll('.switcher-btn').forEach(btn => {
  btn.addEventListener('click', () => {
    const set = btn.dataset.set;
    const val = btn.dataset.val;
    document.documentElement.setAttribute(`data-${set}`, val);
    document.querySelectorAll(`[data-set="${set}"]`).forEach(b => b.classList.remove('active'));
    btn.classList.add('active');
    if (set === 'universe') applyUniverse(val);
  });
});

function applyUniverse(u) {
  document.body.style.background = u === 'manga'
    ? 'linear-gradient(180deg, #F0E8D8 0%, #E8DFCB 100%)'
    : '';
  document.body.style.setProperty('filter', u === 'manga' ? 'sepia(0.05)' : 'none');
}

  Object.entries(map).forEach(([id, name]) => {

}

/* ============================================================
   POPULATE COLOR GRID
   ============================================================ */
function bindColors() {
  const paletteNames = {
    'cloudy-day': 'Día nublado suave',
    'warm-twilight': 'Crepúsculo cálido',
    'starry-night': 'Noche estrellada',
    'cozy-storm': 'Tormenta cozy',
  };
  const activePalette = document.documentElement.getAttribute('data-palette');
  document.getElementById('heroPalette').textContent = paletteNames[activePalette];
  
  const tokens = [
    ['bg', 'bg'],
    ['bg-elev', 'bg-elev'],
    ['surface', 'surface'],
    ['surface-2', 'surface-2'],
    ['mist', 'mist'],
    ['text', 'text'],
    ['text-muted', 'text-muted'],
    ['text-soft', 'text-soft'],
    ['primary', 'primary'],
    ['primary-soft', 'primary-soft'],
    ['accent', 'accent'],
    ['accent-soft', 'accent-soft'],
    ['success', 'success'],
    ['warning', 'warning'],
    ['error', 'error'],
    ['star', 'star'],
  ];
  
  const grid = document.getElementById('colorGrid');
  if (!grid) return;
  
  grid.innerHTML = tokens.map(([name, label]) => {
    const val = getComputedStyle(document.documentElement).getPropertyValue(`--${name}`).trim();
    const isDark = ['text', 'text-muted', 'text-soft', 'primary'].includes(name);
    return `
      <div class="color-chip">
        <div class="color-swatch" style="background: var(--${name}); color: ${isDark ? 'white' : 'var(--text)'};">
          <span class="mono" style="font-size: 9px; opacity: 0.7;">${label}</span>
        </div>
        <div class="color-chip-meta">
          <div class="color-chip-name">${name}</div>
          <div class="color-chip-hex">${val}</div>
        </div>
      </div>
    `;
  }).join('');
}

      <span class="kw">case</span> <span class="cls">KumoriyaPalette</span>.warmTwilight:

<span class="com">/// Contenedor que aplica el fondo y overlay del universo activo.</span>
<span class="kw">class</span> <span class="cls">UniverseBackground</span> <span class="kw">extends</span> <span class="cls">StatelessWidget</span> {
  <span class="kw">final</span> <span class="cls">Widget</span> child;
  <span class="kw">const</span> <span class="cls">UniverseBackground</span>({<span class="kw">super</span>.key, <span class="kw">required</span> <span class="kw">this</span>.child});

  <span class="at">@override</span>
  <span class="cls">Widget</span> <span class="fn">build</span>(<span class="cls">BuildContext</span> context) {
    <span class="kw">final</span> u = context.<span class="fn">watch</span>&lt;<span class="cls">UniverseModel</span>&gt;();
    <span class="kw">return</span> <span class="cls">Stack</span>(
      children: [
        <span class="com">// Fondo según universo</span>
        <span class="cls">Positioned</span>.<span class="fn">fill</span>(
          child: u.isAnime
            ? <span class="kw">const</span> <span class="cls">_SkyGradient</span>()
            : <span class="kw">const</span> <span class="cls">_WashiGradient</span>(),
        ),
        <span class="com">// Ambient solo en Anime · Cielo</span>
        <span class="kw">if</span> (u.isAnime) ...[
          <span class="kw">const</span> <span class="cls">Positioned</span>.<span class="fn">fill</span>(child: <span class="cls">DriftingClouds</span>()),
          <span class="kw">const</span> <span class="cls">Positioned</span>.<span class="fn">fill</span>(child: <span class="cls">StarryBackground</span>(starCount: <span class="num">40</span>)),
        ],
        <span class="com">// Overlay de papel solo en Manga · Papel</span>
        <span class="kw">if</span> (u.isManga)
          <span class="kw">const</span> <span class="cls">Positioned</span>.<span class="fn">fill</span>(child: <span class="cls">WashiTextureOverlay</span>(opacity: <span class="num">0.08</span>)),
        <span class="com">// Contenido real</span>
        child,
      ],
    );
  }
}

<span class="kw">class</span> <span class="cls">_SkyGradient</span> <span class="kw">extends</span> <span class="cls">StatelessWidget</span> {

<span class="kw">class</span> <span class="cls">_WashiGradient</span> <span class="kw">extends</span> <span class="cls">StatelessWidget</span> {

function showDart(key) {
  document.querySelectorAll('.code-tab').forEach(t => t.classList.toggle('active', t.dataset.code === key));
  document.getElementById('dartCode').innerHTML = `<button class="code-copy" onclick="navigator.clipboard.writeText(document.getElementById('dartCode').innerText)">copiar</button><pre>${DART_SNIPPETS[key]}</pre>`;
}

document.querySelectorAll('.code-tab').forEach(t => {
  t.addEventListener('click', () => showDart(t.dataset.code));
});

/* ============================================================
   STAR GENERATION in hero
   ============================================================ */
function makeStars() {
  const container = document.getElementById('heroStars');
  if (!container) return;
  container.innerHTML = '';
  for (let i = 0; i < 40; i++) {
    const s = document.createElement('div');
    s.className = 'star';
    s.style.top = Math.random() * 100 + '%';
    s.style.left = Math.random() * 100 + '%';
    s.style.animationDelay = Math.random() * 4 + 's';
    s.style.width = (1 + Math.random() * 2) + 'px';
    s.style.height = s.style.width;
    container.appendChild(s);
  }
}

/* ============================================================
   INIT
   ============================================================ */
function render() {
  bindIcons();
  bindColors();
  renderMockups();
  showDart('theme');
  makeStars();
}

// Re-render on theme change
const observer = new MutationObserver(() => render());
observer.observe(document.documentElement, { attributes: true, attributeFilter: ['data-palette', 'data-typography', 'data-icon-style', 'data-universe'] });

render();
</script>
