name: kumoriya_app
description: Kumoriya main Flutter application.
publish_to: none
version: 0.4.0+8

resolution: workspace

environment:
  sdk: ^3.11.1

dependencies:
  flutter:
    sdk: flutter
  flutter_localizations:
    sdk: flutter
  intl: any
  flutter_riverpod: ^3.0.3
  media_kit: ^1.2.6
  media_kit_video: ^2.0.1
  # Desktop-only media_kit native libs. We intentionally exclude
  # `media_kit_libs_android_video` (pulled in by the meta-package
  # `media_kit_libs_video`) because Android playback goes through the
  # first-party `kumoriya_exoplayer` plugin — shipping libmpv +
  # libavcodec + libdav1d on Android adds ~40MB of .so to the APK that
  # the app never loads. `PlaybackEngineFactory` guards at runtime so
  # no media_kit code path is exercised on Android.
  media_kit_libs_linux: ^1.2.1
  media_kit_libs_windows_video: ^1.0.11
  media_kit_libs_macos_video: ^1.1.4
  # ExoPlayer engine for Android (AV1 streaming). On non-Android platforms
  # the plugin is not wired — PlaybackEngineFactory guards by platform.
  video_player: ^2.9.0
  kumoriya_anilist:
  kumoriya_core:
  kumoriya_domain:
  kumoriya_plugins:
  kumoriya_matching:
  kumoriya_resolver_common:
  kumoriya_source_jkanime:
  kumoriya_source_animeflv:
  kumoriya_source_animeav1:
  kumoriya_source_anime_nexus:
  kumoriya_resolver_jkplayer:
  kumoriya_resolver_streamwish:
  kumoriya_resolver_mixdrop:
  kumoriya_resolver_filemoon:
  kumoriya_resolver_mp4upload:
  kumoriya_resolver_pixeldrain:
  kumoriya_resolver_streamtape:
  kumoriya_resolver_vidhide:
  kumoriya_resolver_voe:
  kumoriya_resolver_doodstream:
  kumoriya_resolver_yourupload:
  kumoriya_resolver_okru:
  kumoriya_resolver_hqq:
  kumoriya_resolver_zilla:
  kumoriya_resolver_upnshare:
  kumoriya_resolver_anime_nexus:
  kumoriya_resolver_mediafire:
  kumoriya_manga_domain:
  kumoriya_manga_plugins:
  kumoriya_mangabaka:
  kumoriya_mangaupdates:
  kumoriya_reader:
  kumoriya_source_inmanga:
  kumoriya_source_lectortmo:
  kumoriya_source_mangadex:
  kumoriya_source_manhwaweb:
  kumoriya_source_nekoscan:
  kumoriya_source_olympus:
  kumoriya_source_visormanga:
  kumoriya_source_runtime:
  kumoriya_storage:
  kumoriya_sync:
  kumoriya_auth:
  kumoriya_exoplayer:
  drift:
  sqlite3_flutter_libs:
  path_provider:
  path:
  cached_network_image: ^3.4.1
  flutter_cache_manager: ^3.4.1
  http: any
  cronet_http: any
  archive: ^4.0.7
  url_launcher: ^6.3.1
  flutter_secure_storage: ^9.2.4
  app_links: ^6.4.0
  workmanager: ^0.9.0+3
  flutter_local_notifications: ^21.0.0
  permission_handler: ^12.0.1
  file_picker: ^10.3.2
  crypto: ^3.0.6
  window_manager: ^0.5.1
  screen_brightness: ^2.1.7
  volume_controller: ^3.4.4
  flutter_foreground_task: ^9.2.1
  flutter_webrtc: ^0.12.12+hotfix.1
  web_socket_channel: ^3.0.3
  open_filex: ^4.7.0
  package_info_plus: ^9.0.1
  device_info_plus: ^11.0.0
  sentry_flutter: ^9.16.0
  firebase_core: ^3.8.0
  firebase_messaging: ^15.1.5
  connectivity_plus: ^6.1.0
  share_plus: ^10.1.4
  battery_plus: ^6.2.1
